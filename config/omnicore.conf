# OmniCoreKernel 配置文件

# 系统设置
SYSTEM_NAME="OmniCoreKernel"
VERSION="1.0.0"
DEBUG_MODE=false

# 记忆设置
MEMORY_DIR="data/memory"
STATE_DIR="data/state"
MAX_MEMORY_SIZE="10MB"
BACKUP_RETENTION_DAYS=30

# 同步设置
AUTO_SYNC=true
SYNC_INTERVAL=300
CONFLICT_RESOLUTION="merge"

# GitHub设置
GITHUB_REPO="770668004/omnicore-memory-system"
GITHUB_BRANCH="main"
AUTO_COMMIT=true

# 语言设置
DEFAULT_LANGUAGE="zh_cn"
TIMEZONE="Asia/Shanghai"

# 安全设置
ENCRYPTION_ENABLED=false
SENSITIVE_CATEGORIES="password,secret,private,api_key"

# 运行时设置
SESSION_TIMEOUT=3600
MEMORY_CLEANUP_INTERVAL=86400
MAX_CONCURRENT_SESSIONS=5